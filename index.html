<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Gallery</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: "Inter", sans-serif;
    background: #020617;
    color: #e2e8f0;
}

/* HEADER */
header {
    padding: 12px 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: space-between;
    background: rgba(15, 23, 42, 0.9);
    position: sticky;
    top: 0;
    z-index: 10;
}

/* CONTROLS */
.controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

input, select {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #0f172a;
    color: white;
    font-size: 14px;
}

/* FILTER BUTTONS */
.filters {
    display: flex;
    gap: 6px;
}

.filters button {
    padding: 8px 12px;
    border-radius: 20px;
    border: none;
    background: #1e293b;
    color: #cbd5f5;
    cursor: pointer;
}

.filters button.active {
    background: #6366f1;
    color: white;
}

/* GALLERY */
.gallery {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

/* TABLET */
@media(min-width: 600px) {
    .gallery {
        grid-template-columns: repeat(3, 1fr);
    }
}

/* DESKTOP */
@media(min-width: 1000px) {
    .gallery {
        grid-template-columns: repeat(4, 1fr);
    }
}

/* CARD */
.card {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    background: #0f172a;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

/* MEDIA */
.card img, .card video {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

/* PLAY ICON */
.play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 50%;
}

/* INFO */
.info {
    padding: 8px;
    font-size: 12px;
}

/* EMPTY STATE */
.empty {
    text-align: center;
    margin-top: 40px;
    color: #94a3b8;
}

/* LIGHTBOX */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

.lightbox img, .lightbox video {
    max-width: 95%;
    max-height: 85%;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 26px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <input type="text" id="search" placeholder="Search...">

    <div class="filters">
        <button class="active" onclick="setFilter('all')">All</button>
        <button onclick="setFilter('image')">Images</button>
        <button onclick="setFilter('video')">Videos</button>
    </div>

    <select id="sort">
        <option value="name">Sort Name</option>
        <option value="date">Sort Date</option>
    </select>
</header>

<div class="gallery" id="gallery"></div>
<div class="empty" id="empty" style="display:none;">No media found</div>

<div class="lightbox" id="lightbox">
    <span class="close-btn" onclick="closeLightbox()">✖</span>
</div>

<script>
const mediaFiles = [
    {name:"Image1", file:"media/photo1.jpeg", date:"2024-01-01"},
    {name:"Image2", file:"media/video2.mp4", date:"2024-02-10"},
    {name:"Video1", file:"media/video1.mp4", date:"2024-03-05"},
    {name:"Video3", file:"media/video3.mp4", date:"2024-03-05"},
    {name:"Video4", file:"media/video4.mp4", date:"2024-03-05"},
     {name:"Image2", file:"media/photo2.jpeg", date:"2024-01-01"},
      {name:"Image1", file:"media/photo3.jpeg", date:"2024-01-01"},
       {name:"Image1", file:"media/photo4.jpeg", date:"2024-01-01"},
        {name:"Image1", file:"media/photo5.jpeg", date:"2024-01-01"},
         {name:"Image1", file:"media/photo6.jpeg", date:"2024-01-01"},
          {name:"Image1", file:"media/photo7.jpeg", date:"2024-01-01"},
           {name:"Image1", file:"media/photo8.jpeg", date:"2024-01-01"},
            {name:"Image1", file:"media/photo9.jpeg", date:"2024-01-01"},
];

let currentFilter = "all";

function isVideo(file) {
    return file.endsWith(".mp4");
}

function setFilter(type) {
    currentFilter = type;
    document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
    renderGallery();
}

function renderGallery() {
    const gallery = document.getElementById("gallery");
    const empty = document.getElementById("empty");
    gallery.innerHTML = "";

    let filtered = mediaFiles.filter(item => {
        if (currentFilter === "image") return !isVideo(item.file);
        if (currentFilter === "video") return isVideo(item.file);
        return true;
    });

    const search = document.getElementById("search").value.toLowerCase();
    filtered = filtered.filter(m => m.name.toLowerCase().includes(search));

    if (filtered.length === 0) {
        empty.style.display = "block";
        return;
    } else {
        empty.style.display = "none";
    }

    filtered.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        let media = isVideo(item.file)
            ? `<video src="${item.file}" muted preload="metadata"></video>`
            : `<img src="${item.file}" loading="lazy">`;

        card.innerHTML = `
            ${media}
            ${isVideo(item.file) ? '<div class="play">▶</div>' : ''}
            <div class="info">
                <b>${item.name}</b>
                ${item.date}
            </div>
        `;

        card.onclick = () => openLightbox(item.file);
        gallery.appendChild(card);
    });
}

function openLightbox(file) {
    const lb = document.getElementById("lightbox");
    lb.style.display = "flex";

    lb.innerHTML = `
        <span class="close-btn" onclick="closeLightbox()">✖</span>
        ${isVideo(file)
            ? `<video src="${file}" controls autoplay></video>`
            : `<img src="${file}">`}
    `;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

document.getElementById("search").addEventListener("input", renderGallery);
document.getElementById("sort").addEventListener("change", e => {
    if (e.target.value === "name") {
        mediaFiles.sort((a,b) => a.name.localeCompare(b.name));
    } else {
        mediaFiles.sort((a,b) => new Date(b.date) - new Date(a.date));
    }
    renderGallery();
});

renderGallery();
</script>

</body>
</html>
